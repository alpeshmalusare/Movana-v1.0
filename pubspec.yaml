name: movana
description: Premium OTT movie and series discovery app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  firebase_storage: ^12.3.7
  firebase_analytics: ^11.3.6
  firebase_crashlytics: ^4.2.0
  firebase_messaging: ^15.1.6
  firebase_functions: ^5.1.6
  google_sign_in: ^6.2.2
  google_mobile_ads: ^5.2.0
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/movana_logo.png
    - assets/images/movana_icon.png
    - assets/images/jiohotstar_logo.png